<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETH 莽禄聸氓聹颅莽聢聹茅聧聮氓聴聴莽芦路</title>
<style>
  :root {
    --bg: #0d1117;
    --text: #c9d1d9;
    --accent: #4da6ff;
    --bar: #3fb950;
    --bar2: #4da6ff;
    --line: #f0883e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Consolas', 'Courier New', monospace;
    color: var(--text);
    padding: 20px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 18px; color: var(--accent); margin-bottom: 6px; }
  .sub { font-size: 11px; color: #888; margin-bottom: 16px; }

  .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .btn {
    padding: 6px 14px; border: 1px solid #30363d;
    background: #161b22; color: var(--text);
    border-radius: 6px; cursor: pointer; font-size: 12px;
    font-family: inherit;
  }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .canvas-wrap {
    background: #161b22;
    border-radius: 8px;
    border: 1px solid #30363d;
    padding: 12px;
    margin-bottom: 14px;
    overflow-x: auto;
  }
  canvas { display: block; }

  .info {
    display: flex; gap: 24px; flex-wrap: wrap;
    font-size: 12px; color: #8b949e; margin-top: 8px;
  }
  .info span { color: var(--text); }
  .legend { display: flex; gap: 16px; font-size: 11px; align-items: center; }
  .legend .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
  .legend .dot.green { background: var(--bar); }
  .legend .dot.orange { background: var(--line); }

  .error-msg {
    display: none; padding: 10px; margin-top: 12px;
    background: rgba(255,82,82,0.12); border-radius: 6px;
    font-size: 11px; color: #ff5252; text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h1>ETH/USDT 莽禄聸氓聹颅莽聢聹茅聧聮氓聴聴莽芦路</h1>
  <div class="sub" id="rangeLabel">忙聺漏?7 忙戮露芒聲聛莽職卢茅聫聝莽娄聼莽禄戮?猫路炉 氓搂拢氓驴聨茅聡聹忙碌聽猫聹聜莽露聟茅聨麓忙聞陋忙掳娄茅聳虏氓驴聲莽聳庐茅聧聰?/div>

  <div class="controls">
    <button class="btn" data-days="3">3 忙戮露?/button>
    <button class="btn active" data-days="7">7 忙戮露?/button>
    <button class="btn" data-days="14">14 忙戮露?/button>
    <span style="margin-left:auto;font-size:11px;color:#888;" id="updateTime">--</span>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="legend">
    <span><span class="dot green"></span> 茅聨麓忙聞陋忙掳娄茅聳虏氓驴楼莽麓聶莽禄聸氓聹颅莽聢聹茅聫聛盲录麓氓聶潞茅聰聸?/span>
    <span><span class="dot orange"></span> 猫陇掳忙聮鲁氓垄聽忙碌聽茅聰聥莽聣赂</span>
  </div>

  <div class="info">
    <div>猫陇掳忙聮鲁氓垄聽忙碌聽茅聰聥莽聣赂 <span id="curPrice">--</span></div>
    <div>莽禄聸氓聹颅莽聢聹莽聙碌氓聴聸忙鲁娄茅聧聳?<span id="peakZone">--</span></div>
    <div>茅聫聛莽聣聢氓碌聛茅聫聣茫聝娄莽掳庐 <span id="source">--</span></div>
  </div>

  <div class="error-msg" id="error"></div>
</div>

<script>
const BINANCE_KLINES = "https://api.binance.com/api/v3/klines";
const BINANCE_TICKER = "https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT";

let currentDays = 7;
let klineData = [];
let curPrice = null;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ===== 茅聫聛莽聣聢氓碌聛茅聭戮氓鲁掳氓陆聡 =====
async function fetchKlines(days) {
  const limit = days * 24;
  const url = `${BINANCE_KLINES}?symbol=ETHUSDT&interval=1h&limit=${limit}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const raw = await resp.json();
  return raw.map(k => ({
    open:  parseFloat(k[1]),
    high:  parseFloat(k[2]),
    low:   parseFloat(k[3]),
    close: parseFloat(k[4]),
    vol:   parseFloat(k[5]),        // 茅聨麓忙聞陋忙掳娄茅聳虏氓驴楼莽麓聶莽聰炉盲陆鹿忙鹿掳忙碌拢氓露聫莽麓職
    qvol:  parseFloat(k[7]),        // 茅聨麓忙聞陋忙掳娄忙拢掳忙驴聯莽麓聶USDT茅聰聸?  }));
}

async function fetchCurrentPrice() {
  const resp = await fetch(BINANCE_TICKER);
  const data = await resp.json();
  return parseFloat(data.price);
}

// ===== 莽禄聸氓聹颅莽聢聹茅聧聮氓聴聴莽芦路莽聮聛茂录聞莽聲禄 =====
function buildDistribution(klines, bins = 60) {
  const allPrices = [];
  klines.forEach(k => {
    // 氓搂拢氓驴聰莽聣麓K莽禄戮猫路篓忙庐聭忙楼聜忙篓鹿莽露聠忙碌聽莽聳炉氓炉聳茅聧楼忙聺聭卯聡庐忙聬麓忙聳戮莽芦麓忙露聯卯聛聝莽聨炉茅聫聧莽聟聨氓掳炉茅聴聜猫戮戮莽麓聺茅聨麓忙聞陋忙掳娄茅聳虏氓驴聯忙陆聨茅聨陆氓漏聜氓聼聦莽聮聡茫聝楼氓掳炉茅聴聜?    const range = k.high - k.low;
    if (range === 0) {
      allPrices.push({ price: k.close, vol: k.vol });
      return;
    }
    // 莽禄聽芒聜卢茅聧聴忙聸聻卯聵漏茅聬聻氓聴颅莽麓掳茅聨露氓漏聝氓聻職忙碌聹茫聜聣氓聶潞茅聨赂氓陇聬莽聫庐忙碌拢氓潞聺莽聨炉茅聧搂氓聸搂氓炉聭茅聧聮氓聴聸氓聨陇茅聧聮忙聺驴卯聵驴忙露聯卯聛聢氓聶掳茅聫聧茅拢聨氓聛拢
    const steps = Math.max(2, Math.floor(range / 2));
    for (let i = 0; i <= steps; i++) {
      const p = k.low + (range * i / steps);
      allPrices.push({ price: p, vol: k.vol / (steps + 1) });
    }
  });

  if (allPrices.length === 0) return [];

  allPrices.sort((a, b) => a.price - b.price);
  const minP = allPrices[0].price;
  const maxP = allPrices[allPrices.length - 1].price;
  const binW = (maxP - minP) / bins;

  const dist = [];
  for (let i = 0; i < bins; i++) {
    const binLow = minP + i * binW;
    const binHigh = binLow + binW;
    let totalVol = 0;
    for (const item of allPrices) {
      if (item.price >= binLow && item.price < binHigh) totalVol += item.vol;
    }
    dist.push({
      low: binLow,
      high: binHigh,
      mid: (binLow + binHigh) / 2,
      vol: totalVol,
    });
  }
  return dist;
}

// ===== Canvas 莽录聛忙篓潞氓聼聴 =====
function draw(dist) {
  const W = 860;
  const H = 400;
  const pad = { top: 20, right: 30, bottom: 50, left: 70 };
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  canvas.width = W;
  canvas.height = H;
  canvas.style.width = Math.min(860, window.innerWidth - 44) + "px";
  canvas.style.height = "400px";

  ctx.clearRect(0, 0, W, H);

  if (dist.length === 0) return;

  const maxVol = Math.max(...dist.map(d => d.vol));
  const allPrices = dist.map(d => d.mid);
  const minP = Math.min(...allPrices);
  const maxP = Math.max(...allPrices);

  const scaleX = (p) => pad.left + ((p - minP) / (maxP - minP)) * pw;
  const scaleY = (v) => pad.top + ph - (v / maxVol) * ph;

  // 莽录聝忙聢聻莽聣赂莽禄戮?  ctx.strokeStyle = "#21262d";
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + (ph * i / 5);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }

  // 忙碌聽茅聰聥莽聣赂忙聺聻氓颅聵莽聢拢莽禄聸?  ctx.fillStyle = "#8b949e";
  ctx.font = "10px Consolas";
  ctx.textAlign = "right";
  for (let i = 0; i <= 5; i++) {
    const p = minP + (maxP - minP) * i / 5;
    const y = pad.top + ph - (ph * i / 5);
    ctx.fillText("$" + p.toFixed(0), pad.left - 8, y + 4);
  }

  // 茅聫聦猫戮漏氓搂赂茅聧楼?  const barW = Math.max(2, (pw / dist.length) * 0.85);
  dist.forEach(d => {
    const x = scaleX(d.mid) - barW / 2;
    const y = scaleY(d.vol);
    const h = ph - (d.vol / maxVol) * ph;
    ctx.fillStyle = "#3fb950";
    ctx.fillRect(x, y, barW, h);
  });

  // 猫陇掳忙聮鲁氓垄聽忙碌聽茅聰聥莽聣赂莽禄戮?  if (curPrice && curPrice >= minP && curPrice <= maxP) {
    const cx = scaleX(curPrice);
    ctx.strokeStyle = "#f0883e";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + ph); ctx.stroke();
    ctx.setLineDash([]);

    // 忙碌聽茅聰聥莽聣赂茅聫聧氓聸漏卯聞路
    ctx.fillStyle = "#f0883e";
    ctx.font = "bold 11px Consolas";
    ctx.textAlign = "center";
    ctx.fillText("$" + curPrice.toFixed(2), cx, pad.top - 6);
  }
}

// ===== 茅聨碌氓聣搂卯聞虏茅聬庐盲陆赂莽聵聭茅聴聠氓聴聴氓掳炉 =====
function findPeakZone(dist) {
  if (dist.length === 0) return "--";
  const sorted = [...dist].sort((a, b) => b.vol - a.vol);
  const top = sorted[0];
  return `$${top.low.toFixed(0)} ~ $${top.high.toFixed(0)}`;
}

// ===== 忙露聯莽禄聵莽楼娄莽禄聥?=====
async function load(days) {
  currentDays = days;
  try {
    const [klines, price] = await Promise.all([
      fetchKlines(days),
      fetchCurrentPrice(),
    ]);
    klineData = klines;
    curPrice = price;

    const dist = buildDistribution(klines, 60);
    draw(dist);

    document.getElementById("curPrice").textContent = "$" + price.toLocaleString("en-US", { minimumFractionDigits: 2 });
    document.getElementById("peakZone").textContent = findPeakZone(dist);
    document.getElementById("source").textContent = "Binance 猫路炉 " + klines.length + " 茅聫聧莽聭掳莽職卢茅聫聝莽娄聼莽禄戮?;
    document.getElementById("rangeLabel").textContent = `忙聺漏?${days} 忙戮露芒聲聛莽職卢茅聫聝莽娄聼莽禄戮?猫路炉 氓搂拢氓驴聨茅聡聹忙碌聽猫聹聜莽露聟茅聨麓忙聞陋忙掳娄茅聳虏氓驴聲莽聳庐茅聧聰莽聡禄;
    document.getElementById("updateTime").textContent = new Date().toLocaleTimeString("zh-CN", { hour12: false });
  } catch (e) {
    document.getElementById("error").style.display = "block";
    document.getElementById("error").textContent = "茅聧聰莽聤潞忙碌聡忙戮露猫戮芦猫搂娄: " + e.message;
  }
}

// ===== UI 忙碌聹氓卢漏忙卢垄 =====
document.querySelectorAll(".btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    load(parseInt(btn.dataset.days));
  });
});

// 茅聧聮忙驴聠卯聺聬茅聧聳?load(7);
// 氓搂拢?0莽禄聣忙聨聭氓聼聸茅聫聜?setInterval(() => load(currentDays), 30000);
</script>
</body>
</html>
